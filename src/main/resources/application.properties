# ===============================
# Server Configuration
# ===============================
# Port where the Spring Boot application will run
server.port=8080

# ===============================
# Database Configuration
# ===============================
# Default uses H2 in-memory for local testing.
# To connect to MySQL, set the corresponding environment variables.
# Example PowerShell:
#   $env:SPRING_DATASOURCE_URL = "jdbc:mysql://localhost:3306/erp_db?useSSL=false&serverTimezone=UTC"
#   $env:SPRING_DATASOURCE_USERNAME = "your_mysql_user"
#   $env:SPRING_DATASOURCE_PASSWORD = "your_mysql_password"
#   $env:SPRING_DATASOURCE_DRIVER_CLASS_NAME = "com.mysql.cj.jdbc.Driver"
# Then run: mvn spring-boot:run
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:erp_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# ===============================
# JPA / Hibernate Configuration
# ===============================
# update: Updates the schema if necessary, but doesn't drop existing data.
spring.jpa.hibernate.ddl-auto=update
# Print SQL queries in the console for debugging
spring.jpa.show-sql=true
# Format the SQL queries so they are readable in the console
spring.jpa.properties.hibernate.format_sql=true
# Use H2 dialect for H2 database, MySQL dialect for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ===============================
# JWT Configuration
# ===============================
# Secret key used to sign the JWT. (This should ideally be an environment variable in production)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Token expiration time in milliseconds (86400000 ms = 24 hours)
jwt.expirationMs=86400000

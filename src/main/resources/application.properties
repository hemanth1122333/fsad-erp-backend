# ===============================
# Server Configuration
# ===============================
# Port where the Spring Boot application will run
server.port=8080

# ===============================
# Database Configuration (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME:erp_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Hemanth@28032007}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
# update: Updates the schema if necessary, but doesn't drop existing data.
spring.jpa.hibernate.ddl-auto=update
# Print SQL queries in the console for debugging
spring.jpa.show-sql=true
# Format the SQL queries so they are readable in the console
spring.jpa.properties.hibernate.format_sql=true
# Explicitly setting the MySQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# JWT Configuration
# ===============================
# Secret key used to sign the JWT. (This should ideally be an environment variable in production)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Token expiration time in milliseconds (86400000 ms = 24 hours)
jwt.expirationMs=86400000
